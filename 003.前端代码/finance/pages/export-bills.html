<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>导出账单 - 每日财务管家</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <link href="../assets/css/base.css" rel="stylesheet">
    <script src="../assets/js/auth.js"></script>
    <script>Auth.check();</script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#0b1c30", "primary": "#004ac6", "primary-container": "#2563eb",
                        "on-primary": "#ffffff", "on-primary-container": "#eeefff",
                        "surface-container-lowest": "#ffffff", "surface-container": "#e5eeff",
                        "surface-container-high": "#dce9ff", "outline-variant": "#c3c6d7",
                        "outline": "#737686", "on-surface-variant": "#434655",
                        "bg-light": "#F8FAFC", "surface": "#f8f9ff", "background": "#f8f9ff",
                        "success-growth": "#10B981", "danger-expense": "#EF4444",
                        "secondary": "#006c49", "secondary-container": "#6cf8bb",
                        "tertiary": "#784b00", "tertiary-container": "#996100",
                        "surface-dark": "#1E293B", "bg-dark": "#0F172A",
                        "error": "#ba1a1a", "error-container": "#ffdad6", "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"
                    },
                    "spacing": {
                        "base-unit": "4px", "touch-target-min": "44px",
                        "container-margin": "16px", "card-padding": "20px", "gutter": "12px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"], "body-md": ["Inter"],
                        "body-sm": ["Inter"], "label-caps": ["Inter"], "numeric-data": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "numeric-data": ["20px", {"lineHeight": "24px", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-bg-light text-on-surface min-h-screen pb-24">

    <!-- 顶部导航栏 -->
    <header class="sticky top-0 z-40 flex justify-between items-center px-container-margin py-3 w-full max-w-7xl mx-auto bg-surface/90 dark:bg-bg-dark/90 backdrop-blur-md border-b border-outline-variant/20 shadow-sm">
        <div class="flex items-center gap-3">
            <a href="settings.html" class="w-11 h-11 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95">
                <span class="material-symbols-outlined text-on-surface">arrow_back</span>
            </a>
            <h1 class="text-headline-md font-headline-md text-on-surface">导出账单</h1>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="max-w-3xl mx-auto px-container-margin mt-6">
        <p class="text-body-sm text-on-surface-variant mb-6">选择筛选条件和导出格式，将账单数据下载为文件。</p>

        <!-- 筛选条件 -->
        <div class="bg-surface-container-lowest rounded-xl shadow-sm p-card-padding space-y-6">
            <!-- 月份选择 -->
            <div>
                <label class="text-body-sm font-body-sm text-on-surface-variant mb-1 block">按月筛选（可选）</label>
                <input id="month-picker" type="month" class="w-full rounded-lg border-outline-variant/30 bg-surface-container-lowest px-4 py-3 text-body-md focus:ring-primary focus:border-primary">
            </div>

            <!-- 日期范围 -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-body-sm font-body-sm text-on-surface-variant mb-1 block">起始日期（可选）</label>
                    <input id="start-date" type="date" class="w-full rounded-lg border-outline-variant/30 bg-surface-container-lowest px-4 py-3 text-body-md focus:ring-primary focus:border-primary">
                </div>
                <div>
                    <label class="text-body-sm font-body-sm text-on-surface-variant mb-1 block">结束日期（可选）</label>
                    <input id="end-date" type="date" class="w-full rounded-lg border-outline-variant/30 bg-surface-container-lowest px-4 py-3 text-body-md focus:ring-primary focus:border-primary">
                </div>
            </div>

            <!-- 类型筛选 -->
            <div>
                <label class="text-body-sm font-body-sm text-on-surface-variant mb-1 block">类型（可选）</label>
                <select id="type-select" class="w-full rounded-lg border-outline-variant/30 bg-surface-container-lowest px-4 py-3 text-body-md focus:ring-primary focus:border-primary">
                    <option value="">全部</option>
                    <option value="EXPENSE">支出</option>
                    <option value="INCOME">收入</option>
                </select>
            </div>

            <!-- 关键词搜索 -->
            <div>
                <label class="text-body-sm font-body-sm text-on-surface-variant mb-1 block">备注关键词（可选）</label>
                <input id="keyword-input" type="text" placeholder="输入备注关键词搜索" class="w-full rounded-lg border-outline-variant/30 bg-surface-container-lowest px-4 py-3 text-body-md focus:ring-primary focus:border-primary">
            </div>
        </div>

        <!-- 导出格式 -->
        <div class="bg-surface-container-lowest rounded-xl shadow-sm p-card-padding mt-6">
            <h3 class="text-body-sm font-body-sm text-on-surface-variant mb-3">导出格式</h3>
            <div class="grid grid-cols-2 gap-4">
                <label class="flex items-center gap-3 p-4 rounded-xl border-2 border-outline-variant/20 cursor-pointer hover:border-primary/30 has-[:checked]:border-primary has-[:checked]:bg-primary/5 transition-colors">
                    <input type="radio" name="format" value="csv" checked class="text-primary focus:ring-primary">
                    <div>
                        <span class="text-body-md font-body-md text-on-surface">CSV</span>
                        <span class="text-body-sm text-on-surface-variant block">通用格式，Excel 可打开</span>
                    </div>
                </label>
                <label class="flex items-center gap-3 p-4 rounded-xl border-2 border-outline-variant/20 cursor-pointer hover:border-primary/30 has-[:checked]:border-primary has-[:checked]:bg-primary/5 transition-colors">
                    <input type="radio" name="format" value="xlsx" class="text-primary focus:ring-primary">
                    <div>
                        <span class="text-body-md font-body-md text-on-surface">Excel</span>
                        <span class="text-body-sm text-on-surface-variant block">.xlsx，表头样式+格式</span>
                    </div>
                </label>
            </div>
        </div>

        <!-- 导出按钮 -->
        <button id="btn-export" class="w-full mt-6 py-4 bg-primary text-on-primary font-headline-md rounded-xl hover:bg-primary/90 transition-all active:scale-95 duration-100 flex items-center justify-center gap-2">
            <span class="material-symbols-outlined">download</span>
            <span id="btn-text">导出账单</span>
        </button>

        <!-- 提示信息 -->
        <div class="mt-4 p-4 rounded-xl bg-surface-container text-on-surface-variant text-body-sm">
            <div class="flex items-start gap-2">
                <span class="material-symbols-outlined text-outline text-[18px] mt-0.5">info</span>
                <div>
                    <p>· 单次最多导出 50,000 行数据</p>
                    <p>· 仅导出当前账号的账单数据</p>
                    <p>· CSV 文件使用 UTF-8 BOM 编码，Excel 打开中文不乱码</p>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部导航 -->
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe pt-2 bg-surface/80 backdrop-blur-xl border-t border-outline-variant/10 shadow-[0_-4px_12px_0_rgba(0,0,0,0.05)] rounded-t-xl">
        <div id="bottom-nav"></div>
    </nav>
    <script src="../assets/js/nav.js"></script>
    <script>Nav.init('settings');</script>

    <script>
    (function () {
        var btnExport = document.getElementById('btn-export');
        var btnText = document.getElementById('btn-text');

        // 默认选中当月
        var now = new Date();
        var monthStr = now.getFullYear() + '-' + (now.getMonth() + 1 < 10 ? '0' + (now.getMonth() + 1) : (now.getMonth() + 1));
        document.getElementById('month-picker').value = monthStr;

        btnExport.addEventListener('click', function () {
            var month = document.getElementById('month-picker').value;
            var startDate = document.getElementById('start-date').value;
            var endDate = document.getElementById('end-date').value;
            var type = document.getElementById('type-select').value;
            var keyword = document.getElementById('keyword-input').value.trim();
            var format = document.querySelector('input[name="format"]:checked').value;

            // 构建 URL 参数
            var params = new URLSearchParams();
            params.set('format', format);
            if (month) params.set('month', month);
            if (startDate) params.set('start_date', startDate);
            if (endDate) params.set('end_date', endDate);
            if (type) params.set('type', type);
            if (keyword) params.set('keyword', keyword);

            var url = '/api/bills/export?' + params.toString();

            // 禁用按钮，显示加载状态
            btnExport.disabled = true;
            btnText.textContent = '导出中...';

            // 使用 fetch 下载文件
            Auth.fetchApi(url)
                .then(function (response) {
                    if (!response.ok) {
                        return response.json().then(function (err) {
                            throw new Error(err.msg || '导出失败');
                        });
                    }
                    // 从 Content-Disposition 获取文件名
                    var disposition = response.headers.get('Content-Disposition');
                    var filename = 'bills.' + format;
                    if (disposition) {
                        var match = disposition.match(/filename="?([^"]+)"?/);
                        if (match) filename = match[1];
                    }
                    return response.blob().then(function (blob) {
                        return { blob: blob, filename: filename };
                    });
                })
                .then(function (result) {
                    var url = window.URL.createObjectURL(result.blob);
                    var a = document.createElement('a');
                    a.href = url;
                    a.download = result.filename;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                    btnText.textContent = '导出成功';
                    setTimeout(function () {
                        btnText.textContent = '导出账单';
                    }, 2000);
                })
                .catch(function (err) {
                    alert(err.message || '导出失败，请重试');
                    btnText.textContent = '导出账单';
                })
                .finally(function () {
                    btnExport.disabled = false;
                });
        });
    })();
    </script>
</body>
</html>
