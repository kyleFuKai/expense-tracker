<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>统计 - 每日财务管家</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <link href="../assets/css/base.css" rel="stylesheet">
    <script src="../assets/js/auth.js"></script>
    <script>Auth.check();</script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff", "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#ffb95f", "on-secondary-fixed-variant": "#005236",
                        "tertiary": "#784b00", "surface-container-low": "#eff4ff",
                        "secondary": "#006c49", "secondary-fixed": "#6ffbbe",
                        "outline": "#737686", "on-surface": "#0b1c30",
                        "inverse-primary": "#b4c5ff", "secondary-fixed-dim": "#4edea3",
                        "on-tertiary-fixed": "#2a1700", "surface-container": "#e5eeff",
                        "on-primary-fixed": "#00174b", "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#ffddb8", "on-error-container": "#93000a",
                        "outline-variant": "#c3c6d7", "on-secondary-fixed": "#002113",
                        "bg-light": "#F8FAFC", "on-primary": "#ffffff",
                        "surface-bright": "#f8f9ff", "success-growth": "#10B981",
                        "danger-expense": "#EF4444", "inverse-on-surface": "#eaf1ff",
                        "inverse-surface": "#213145", "on-background": "#0b1c30",
                        "tertiary-container": "#996100", "surface-container-high": "#dce9ff",
                        "on-tertiary-container": "#ffeedd", "error": "#ba1a1a",
                        "primary": "#004ac6", "on-tertiary-fixed-variant": "#653e00",
                        "secondary-container": "#6cf8bb", "on-primary-container": "#eeefff",
                        "background": "#f8f9ff", "surface-tint": "#0053db",
                        "surface-dark": "#1E293B", "primary-container": "#2563eb",
                        "on-tertiary": "#ffffff", "on-secondary": "#ffffff",
                        "bg-dark": "#0F172A", "surface-container-highest": "#d3e4fe",
                        "primary-fixed-dim": "#b4c5ff", "surface-variant": "#d3e4fe",
                        "on-secondary-container": "#00714d", "on-surface-variant": "#434655",
                        "warning-alert": "#F59E0B", "primary-fixed": "#dbe1ff",
                        "on-primary-fixed-variant": "#003ea8", "surface": "#f8f9ff",
                        "surface-dim": "#cbdbf5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "12px", "base-unit": "4px", "container-margin": "16px",
                        "touch-target-min": "44px", "card-padding": "20px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"], "body-sm": ["Inter"], "body-lg": ["Inter"],
                        "display-hero-mobile": ["Inter"], "display-hero": ["Inter"],
                        "label-caps": ["Inter"], "numeric-data": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                        "display-hero-mobile": ["28px", {"lineHeight": "34px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "display-hero": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "numeric-data": ["20px", {"lineHeight": "24px", "fontWeight": "500"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 12px 0 rgba(0, 0, 0, 0.05);
        }
        .chart-gradient {
            background: linear-gradient(180deg, rgba(37, 99, 235, 0.1) 0%, rgba(37, 99, 235, 0) 100%);
        }
    </style>
</head>
<body class="bg-bg-light text-on-surface">

    <!-- ==================== 顶部导航栏 ==================== -->
    <header class="sticky top-0 z-40 flex justify-between items-center px-container-margin py-3 w-full max-w-7xl mx-auto bg-surface/90 backdrop-blur-md border-b border-outline-variant/20 shadow-sm">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary text-headline-md">account_balance_wallet</span>
            <h1 class="text-headline-md font-headline-md font-bold text-primary tracking-tight">每日财务管家</h1>
        </div>
    </header>

    <!-- ==================== 主内容区 ==================== -->
    <main class="max-w-7xl mx-auto px-container-margin py-6 pb-32">

        <!-- 月份切换器 -->
        <section class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-4">
                <button id="btn-prev" class="p-2 bg-surface rounded-full shadow-sm hover:bg-surface-container-high transition-colors border border-outline-variant/30">
                    <span class="material-symbols-outlined text-on-surface">chevron_left</span>
                </button>
                <div class="text-center">
                    <h2 id="month-title" class="font-headline-md text-headline-md text-on-surface">加载中...</h2>
                    <p class="font-label-caps text-label-caps text-on-surface-variant">月度概览</p>
                </div>
                <button id="btn-next" class="p-2 bg-surface rounded-full shadow-sm hover:bg-surface-container-high transition-colors border border-outline-variant/30">
                    <span class="material-symbols-outlined text-on-surface">chevron_right</span>
                </button>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-gutter">

            <!-- 总支出卡片 -->
            <div class="md:col-span-4 glass-card rounded-xl p-card-padding flex flex-col justify-between overflow-hidden relative">
                <div class="z-10">
                    <p class="font-label-caps text-label-caps text-on-surface-variant mb-2">总支出</p>
                    <h3 id="stat-expense" class="font-display-hero text-display-hero-mobile text-on-surface">¥0</h3>
                    <div id="stat-expense-count" class="mt-2 text-body-sm text-on-surface-variant">0 笔支出</div>
                </div>
                <div class="absolute -right-6 -bottom-6 opacity-10">
                    <span class="material-symbols-outlined text-[120px]">account_balance</span>
                </div>
            </div>

            <!-- 支出趋势图 -->
            <div class="md:col-span-8 glass-card rounded-xl p-card-padding">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h4 class="font-headline-md text-headline-md text-on-surface">支出趋势</h4>
                        <p class="font-body-sm text-body-sm text-on-surface-variant">每日支出柱状图</p>
                    </div>
                </div>
                <div id="trend-chart" class="w-full relative flex items-stretch gap-1" style="height:160px">
                    <div class="w-full h-full absolute top-0 left-0 chart-gradient rounded-lg"></div>
                    <div class="col-span-full text-center text-on-surface-variant py-4 w-full">暂无数据</div>
                </div>
            </div>

            <!-- 收入卡片 -->
            <div class="md:col-span-6 glass-card rounded-xl p-card-padding">
                <div class="flex items-center justify-between mb-4">
                    <p class="font-label-caps text-label-caps text-on-surface-variant">本月收入</p>
                    <span id="stat-income" class="font-numeric-data text-numeric-data text-success-growth">¥0</span>
                </div>
                <div class="mt-4 text-body-sm text-on-surface-variant" id="stat-income-count">0 笔收入</div>
            </div>

            <!-- 分类排行 -->
            <div class="md:col-span-6 glass-card rounded-xl p-card-padding">
                <h4 class="font-headline-md text-headline-md text-on-surface mb-6">支出排行</h4>
                <div id="category-ranking" class="space-y-1">
                    <div class="text-center text-on-surface-variant py-8">暂无数据</div>
                </div>
            </div>
        </div>

        <!-- 智能洞察 -->
        <div id="insight-card" class="mt-gutter glass-card rounded-xl p-card-padding bg-gradient-to-r from-primary/5 to-secondary-container/10 border-primary/20 flex items-center gap-6 hidden">
            <div class="bg-primary text-on-primary p-3 rounded-xl">
                <span class="material-symbols-outlined text-[32px]">lightbulb</span>
            </div>
            <div>
                <h5 class="font-headline-md text-headline-md text-primary">财务洞察</h5>
                <p id="insight-text" class="font-body-md text-body-md text-on-surface-variant max-w-2xl"></p>
            </div>
        </div>

        <!-- 空状态 -->
        <div id="empty-state" class="hidden py-16 text-center">
            <span class="material-symbols-outlined text-[64px] text-outline">bar_chart</span>
            <p class="text-body-md text-on-surface-variant mt-4">本月暂无账单数据</p>
            <p class="text-body-sm text-outline mt-1">点击下方 + 按钮开始记账</p>
        </div>
    </main>

    <!-- ==================== 底部导航栏 ==================== -->
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe pt-2 bg-surface/80 backdrop-blur-xl border-t border-outline-variant/10 shadow-[0_-4px_12px_0_rgba(0,0,0,0.05)] rounded-t-xl">
        <div id="bottom-nav"></div>
    </nav>
    <script src="../assets/js/nav.js"></script>
    <script>Nav.init('statistics');</script>

    <script>
    (function () {
        // 当前查看的年月
        var currentYear = new Date().getFullYear();
        var currentMonth = new Date().getMonth() + 1;

        var btnPrev = document.getElementById('btn-prev');
        var btnNext = document.getElementById('btn-next');

        function getMonthStr(y, m) {
            return y + '-' + (m < 10 ? '0' + m : m);
        }

        function loadStats() {
            var monthStr = getMonthStr(currentYear, currentMonth);
            document.getElementById('month-title').textContent = currentYear + '年' + currentMonth + '月';

            // 禁用"下月"按钮
            var now = new Date();
            btnNext.style.display = (currentYear > now.getFullYear() || (currentYear === now.getFullYear() && currentMonth > now.getMonth() + 1)) ? 'none' : '';

            Auth.fetchApi('/bills/stats/month?month=' + monthStr)
            .then(function (result) {
                if (result.code !== 0) return;

                var data = result.data;
                var hasData = (data.expense.total > 0 || data.income.total > 0);

                if (!hasData) {
                    document.getElementById('empty-state').classList.remove('hidden');
                    return;
                }

                document.getElementById('empty-state').classList.add('hidden');

                // 总支出
                document.getElementById('stat-expense').textContent = '¥' + parseFloat(data.expense.total).toFixed(2);
                document.getElementById('stat-expense-count').textContent = data.expense.count + ' 笔支出';

                // 收入
                document.getElementById('stat-income').textContent = '¥' + parseFloat(data.income.total).toFixed(2);
                document.getElementById('stat-income-count').textContent = data.income.count + ' 笔收入';

                // 趋势图 (取最近 15 天)
                renderTrendChart(data.daily.slice(0, 15).reverse());

                // 分类排行
                renderCategoryRanking(data.categories);

                // 洞察
                if (data.expense.total > 0) {
                    document.getElementById('insight-card').classList.remove('hidden');
                    var topCat = data.categories[0];
                    if (topCat && topCat.total > 0) {
                        var pct = (topCat.total / data.expense.total * 100).toFixed(0);
                        document.getElementById('insight-text').textContent = '您的最大支出类别是「' + topCat.name + '」，共计 ¥' + parseFloat(topCat.total).toFixed(2) + '，占总支出的 ' + pct + '%。';
                    }
                }
            });
        }

        function renderTrendChart(dailyData) {
            var chart = document.getElementById('trend-chart');
            if (!dailyData || dailyData.length === 0) {
                chart.innerHTML = '<div class="w-full h-full absolute top-0 left-0 chart-gradient rounded-lg"></div><div class="col-span-full text-center text-on-surface-variant py-4 w-full">暂无数据</div>';
                return;
            }

            var maxVal = 0;
            dailyData.forEach(function (d) { if (d.expense > maxVal) maxVal = d.expense; });
            if (maxVal === 0) maxVal = 1;

            var html = '<div class="w-full h-full absolute top-0 left-0 chart-gradient rounded-lg" style="z-index:0"></div>';
            dailyData.forEach(function (d) {
                var h = Math.max((d.expense / maxVal * 100), 4);
                var dayStr = d.date ? d.date.substring(8) + '日' : '';
                html += '<div class="flex flex-col items-center justify-end gap-1" style="flex:1;z-index:1">';
                html += '<div class="w-full" style="height:' + h + '%;background-color:#004ac6;border-radius:3px 3px 0 0"></div>';
                html += '<span class="text-[9px] text-outline">' + dayStr + '</span>';
                html += '</div>';
            });
            chart.innerHTML = html;
        }

        // 分类颜色
        var catColors = [
            'bg-primary', 'bg-danger-expense', 'bg-secondary', 'bg-warning-alert',
            'bg-purple-500', 'bg-teal-500', 'bg-pink-500', 'bg-indigo-500',
            'bg-orange-500', 'bg-cyan-500'
        ];
        var catIcons = {
            restaurant: 'restaurant', directions_car: 'local_taxi', shopping_bag: 'shopping_bag',
            movie: 'movie', home: 'home', medical_services: 'medical_services',
            school: 'school', group: 'group', payments: 'payments', more_horiz: 'more_horiz',
            default: 'receipt_long'
        };

        function renderCategoryRanking(categories) {
            var container = document.getElementById('category-ranking');
            if (!categories || categories.length === 0) {
                container.innerHTML = '<div class="text-center text-on-surface-variant py-8">暂无数据</div>';
                return;
            }

            var totalExpense = categories.reduce(function (sum, c) { return sum + parseFloat(c.total); }, 0);

            var html = '';
            categories.slice(0, 5).forEach(function (cat, idx) {
                var pct = totalExpense > 0 ? (parseFloat(cat.total) / totalExpense * 100).toFixed(0) : 0;
                var icon = cat.icon || 'receipt_long';
                var color = catColors[idx % catColors.length];

                html += '<div class="flex items-center justify-between p-3 rounded-lg hover:bg-surface-container-low transition-colors group">';
                html += '<div class="flex items-center gap-4">';
                html += '<div class="w-10 h-10 rounded-full ' + color.replace('bg-', 'bg-') + '/10 flex items-center justify-center ' + color.replace('bg-', 'text-') + ' group-hover:scale-110 transition-transform">';
                html += '<span class="material-symbols-outlined">' + icon + '</span>';
                html += '</div>';
                html += '<div>';
                html += '<p class="font-body-md text-body-md font-semibold text-on-surface">' + cat.name + '</p>';
                html += '<p class="font-body-sm text-body-sm text-on-surface-variant">' + cat.count + ' 笔</p>';
                html += '</div>';
                html += '</div>';
                html += '<div class="text-right">';
                html += '<p class="font-numeric-data text-body-md font-bold text-on-surface">¥' + parseFloat(cat.total).toFixed(2) + '</p>';
                html += '<p class="font-label-caps text-label-caps text-on-surface-variant">' + pct + '% 占比</p>';
                html += '</div>';
                html += '</div>';
            });

            container.innerHTML = html;
        }

        // 月份切换
        btnPrev.addEventListener('click', function () {
            currentMonth--;
            if (currentMonth < 1) { currentMonth = 12; currentYear--; }
            loadStats();
        });

        btnNext.addEventListener('click', function () {
            currentMonth++;
            if (currentMonth > 12) { currentMonth = 1; currentYear++; }
            loadStats();
        });

        // 初始化加载
        loadStats();
    })();
    </script>
</body>
</html>
