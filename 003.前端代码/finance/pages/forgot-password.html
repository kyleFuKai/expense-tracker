<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>忘记密码 - 每日财务管家</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <link href="../assets/css/base.css" rel="stylesheet">
    <script src="../assets/js/auth.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff", "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#ffb95f", "on-secondary-fixed-variant": "#005236",
                        "tertiary": "#784b00", "surface-container-low": "#eff4ff",
                        "secondary": "#006c49", "secondary-fixed": "#6ffbbe",
                        "outline": "#737686", "on-surface": "#0b1c30",
                        "inverse-primary": "#b4c5ff", "secondary-fixed-dim": "#4edea3",
                        "on-tertiary-fixed": "#2a1700", "surface-container": "#e5eeff",
                        "on-primary-fixed": "#00174b", "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#ffddb8", "on-error-container": "#93000a",
                        "outline-variant": "#c3c6d7", "on-secondary-fixed": "#002113",
                        "bg-light": "#F8FAFC", "on-primary": "#ffffff",
                        "surface-bright": "#f8f9ff", "success-growth": "#10B981",
                        "danger-expense": "#EF4444", "inverse-on-surface": "#eaf1ff",
                        "inverse-surface": "#213145", "on-background": "#0b1c30",
                        "tertiary-container": "#996100", "surface-container-high": "#dce9ff",
                        "on-tertiary-container": "#ffeedd", "error": "#ba1a1a",
                        "primary": "#004ac6", "on-tertiary-fixed-variant": "#653e00",
                        "secondary-container": "#6cf8bb", "on-primary-container": "#eeefff",
                        "background": "#f8f9ff", "surface-tint": "#0053db",
                        "surface-container-highest": "#d3e4fe", "primary-fixed-dim": "#b4c5ff",
                        "surface-variant": "#d3e4fe", "on-secondary-container": "#00714d",
                        "on-surface-variant": "#434655", "warning-alert": "#F59E0B",
                        "primary-fixed": "#dbe1ff", "on-primary-fixed-variant": "#003ea8",
                        "surface": "#f8f9ff", "surface-dim": "#cbdbf5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"
                    },
                    "spacing": {
                        "touch-target-min": "44px", "card-padding": "20px",
                        "container-margin": "16px", "gutter": "12px", "base-unit": "4px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"], "display-hero-mobile": ["Inter"],
                        "body-md": ["Inter"], "label-caps": ["Inter"],
                        "display-hero": ["Inter"], "body-lg": ["Inter"],
                        "body-sm": ["Inter"], "numeric-data": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "display-hero-mobile": ["28px", {"lineHeight": "34px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "display-hero": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "numeric-data": ["20px", {"lineHeight": "24px", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-bg-light text-on-surface min-h-screen pb-8">

    <!-- ==================== 顶部导航栏 ==================== -->
    <header class="sticky top-0 z-40 flex items-center px-container-margin py-3 w-full max-w-7xl mx-auto bg-surface/90 backdrop-blur-md border-b border-outline-variant/20 shadow-sm">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="w-11 h-11 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95">
                <span class="material-symbols-outlined text-primary">arrow_back</span>
            </a>
            <span class="text-headline-md font-bold text-primary tracking-tight">忘记密码</span>
        </div>
    </header>

    <!-- ==================== 主内容区 ==================== -->
    <main class="max-w-xl mx-auto px-container-margin mt-8">

        <!-- 使用说明提示卡片 -->
        <div class="bg-primary-container/20 border border-primary/20 rounded-xl p-4 mb-8 flex items-start gap-3">
            <span class="material-symbols-outlined text-primary mt-0.5">info</span>
            <p class="text-body-sm text-on-surface-variant">请输入注册时的手机号，我们会发送 6 位验证码。密码长度需为 6-20 个字符，需包含大小写字母、数字和特殊字符。</p>
        </div>

        <!-- 重置密码表单 -->
        <div class="space-y-6">
            <!-- 手机号输入 -->
            <div class="flex flex-col gap-2">
                <label class="text-on-surface text-body-sm font-semibold" for="phone">注册手机号</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">phone</span>
                    <input class="w-full h-touch-target-min pl-12 pr-4 rounded-lg border border-outline-variant bg-surface-container-low text-on-surface text-body-md placeholder:text-outline focus:border-primary focus:outline-none focus:ring-0" id="phone" placeholder="请输入注册手机号" type="tel">
                </div>
            </div>

            <!-- 验证码输入 + 发送按钮 -->
            <div class="flex flex-col gap-2">
                <label class="text-on-surface text-body-sm font-semibold" for="sms-code">短信验证码</label>
                <div class="flex gap-3">
                    <div class="relative flex-1">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">sms</span>
                        <input class="w-full h-touch-target-min pl-12 pr-4 rounded-lg border border-outline-variant bg-surface-container-low text-on-surface text-body-md placeholder:text-outline focus:border-primary focus:outline-none focus:ring-0" id="sms-code" maxlength="6" placeholder="请输入 6 位验证码" type="text">
                    </div>
                    <button id="btn-send" class="h-touch-target-min px-4 bg-primary text-on-primary rounded-lg font-semibold text-body-sm whitespace-nowrap hover:bg-primary/90 transition-all active:scale-[0.98]">
                        发送验证码
                    </button>
                </div>
            </div>

            <!-- 新密码输入 -->
            <div class="flex flex-col gap-2">
                <label class="text-on-surface text-body-sm font-semibold" for="new-password">新密码</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">lock_open</span>
                    <input autocomplete="new-password" class="w-full h-touch-target-min pl-12 pr-12 rounded-lg border border-outline-variant bg-surface-container-low text-on-surface text-body-md placeholder:text-outline focus:border-primary focus:outline-none focus:ring-0" id="new-password" placeholder="6-20位，含大小写字母+数字+特殊字符" type="password">
                    <button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" onclick="togglePassword('new-password', this)" type="button">
                        <span class="material-symbols-outlined">visibility_off</span>
                    </button>
                </div>
            </div>

            <!-- 确认新密码输入 -->
            <div class="flex flex-col gap-2">
                <label class="text-on-surface text-body-sm font-semibold" for="confirm-password">确认新密码</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">lock_reset</span>
                    <input autocomplete="new-password" class="w-full h-touch-target-min pl-12 pr-12 rounded-lg border border-outline-variant bg-surface-container-low text-on-surface text-body-md placeholder:text-outline focus:border-primary focus:outline-none focus:ring-0" id="confirm-password" placeholder="再次输入新密码" type="password">
                    <button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" onclick="togglePassword('confirm-password', this)" type="button">
                        <span class="material-symbols-outlined">visibility_off</span>
                    </button>
                </div>
            </div>

            <!-- 密码强度指示条 -->
            <div class="space-y-2">
                <div class="flex gap-1">
                    <div class="h-1.5 flex-1 bg-surface-container-high rounded-full"></div>
                    <div class="h-1.5 flex-1 bg-surface-container-high rounded-full"></div>
                    <div class="h-1.5 flex-1 bg-surface-container-high rounded-full"></div>
                    <div class="h-1.5 flex-1 bg-surface-container-high rounded-full"></div>
                </div>
                <p class="text-label-caps text-on-surface-variant">密码强度：尚未输入</p>
            </div>

            <!-- 提交按钮 -->
            <button id="btn-submit" class="w-full h-touch-target-min bg-primary text-on-primary rounded-full font-bold text-body-lg shadow-md hover:bg-primary/90 transition-all active:scale-[0.98]">
                确认重置
            </button>

            <!-- 返回登录链接 -->
            <p class="text-center text-body-sm text-on-surface-variant">
                想起来了？<a href="../index.html" class="text-primary font-semibold hover:underline">去登录</a>
            </p>
        </div>
    </main>

    <!-- ==================== 脚本逻辑 ==================== -->
    <script>
    (function () {
        var phoneInput = document.getElementById('phone');
        var smsCodeInput = document.getElementById('sms-code');
        var newPwdInput = document.getElementById('new-password');
        var confirmPwdInput = document.getElementById('confirm-password');
        var btnSend = document.getElementById('btn-send');
        var btnSubmit = document.getElementById('btn-submit');
        var strengthBars = document.querySelectorAll('.space-y-2 .h-1\\.5');
        var strengthText = document.querySelector('.space-y-2 .text-label-caps');
        var countdownTimer = null;

        // 密码可见性切换
        window.togglePassword = function (inputId, btnEl) {
            var input = document.getElementById(inputId);
            var icon = btnEl.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility_off';
            }
        };

        // 密码强度实时评估
        function updateStrength() {
            var pwd = newPwdInput.value;
            var score = 0;
            if (pwd.length >= 6) score++;
            if (pwd.length >= 10) score++;
            if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) score++;
            if (/\d/.test(pwd)) score++;

            var colors = ['bg-outline-variant', 'bg-danger-expense', 'bg-warning-alert', 'bg-primary'];
            var labels = ['尚未输入', '弱', '一般', '强', '极强'];
            for (var i = 0; i < 4; i++) {
                strengthBars[i].className = 'h-1.5 flex-1 bg-surface-container-high rounded-full';
                if (i < score) {
                    strengthBars[i].className = 'h-1.5 flex-1 ' + colors[score - 1] + ' rounded-full';
                }
            }
            strengthText.textContent = '密码强度：' + (pwd ? labels[score] : labels[0]);
        }

        newPwdInput.addEventListener('input', updateStrength);

        // 发送验证码
        btnSend.addEventListener('click', function () {
            var phone = phoneInput.value.trim();
            if (!phone || !/^\d{8,15}$/.test(phone)) {
                alert('请输入正确的手机号');
                return;
            }

            btnSend.disabled = true;
            btnSend.textContent = '发送中...';

            fetch(API_BASE + '/api/auth/send-sms-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: phone })
            })
            .then(function (res) { return res.json(); })
            .then(function (result) {
                if (result.code === 0) {
                    alert('验证码已发送，请查收');
                    startCountdown(60);
                } else {
                    btnSend.disabled = false;
                    btnSend.textContent = '发送验证码';
                    alert(result.msg || '发送失败');
                }
            })
            .catch(function () {
                btnSend.disabled = false;
                btnSend.textContent = '发送验证码';
                alert('网络错误，请稍后重试');
            });
        });

        // 60 秒倒计时
        function startCountdown(seconds) {
            if (countdownTimer) clearInterval(countdownTimer);
            var remaining = seconds;
            btnSend.textContent = remaining + 's 后重发';
            countdownTimer = setInterval(function () {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(countdownTimer);
                    btnSend.disabled = false;
                    btnSend.textContent = '发送验证码';
                } else {
                    btnSend.textContent = remaining + 's 后重发';
                }
            }, 1000);
        }

        // 确认重置
        btnSubmit.addEventListener('click', function () {
            var phone = phoneInput.value.trim();
            var code = smsCodeInput.value.trim();
            var newPassword = newPwdInput.value.trim();
            var confirmPassword = confirmPwdInput.value.trim();

            if (!phone || !/^\d{8,15}$/.test(phone)) {
                alert('请输入正确的手机号');
                return;
            }
            if (!code) {
                alert('请输入验证码');
                return;
            }
            if (!newPassword) {
                alert('请输入新密码');
                return;
            }
            if (newPassword.length < 6) {
                alert('密码长度不能少于6位');
                return;
            }
            if (newPassword !== confirmPassword) {
                alert('两次输入的密码不一致');
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.textContent = '重置中...';

            fetch(API_BASE + '/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: phone, smsCode: code, newPassword: newPassword })
            })
            .then(function (res) { return res.json(); })
            .then(function (result) {
                btnSubmit.disabled = false;
                btnSubmit.textContent = '确认重置';
                if (result.code === 0) {
                    alert('密码重置成功，请使用新密码登录');
                    window.location.href = '../index.html';
                } else {
                    alert(result.msg || '重置失败');
                }
            })
            .catch(function () {
                btnSubmit.disabled = false;
                btnSubmit.textContent = '确认重置';
                alert('网络错误，请稍后重试');
            });
        });
    })();
    </script>
</body>
</html>
