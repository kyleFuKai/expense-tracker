<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>类别管理 - 每日财务管家</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <link href="../assets/css/base.css" rel="stylesheet">
    <script src="../assets/js/auth.js"></script>
    <script>Auth.check();</script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff", "tertiary-fixed-dim": "#ffb95f",
                        "on-surface": "#0b1c30", "on-primary-fixed": "#00174b",
                        "on-primary": "#ffffff", "on-tertiary-fixed-variant": "#653e00",
                        "inverse-on-surface": "#eaf1ff", "on-error-container": "#93000a",
                        "inverse-primary": "#b4c5ff", "error-container": "#ffdad6",
                        "warning-alert": "#F59E0B", "secondary-container": "#6cf8bb",
                        "on-tertiary-fixed": "#2a1700", "primary-container": "#2563eb",
                        "surface": "#f8f9ff", "on-tertiary": "#ffffff",
                        "on-primary-container": "#eeefff", "error": "#ba1a1a",
                        "danger-expense": "#EF4444", "primary": "#004ac6",
                        "primary-fixed": "#dbe1ff", "on-secondary-fixed-variant": "#005236",
                        "surface-container-highest": "#d3e4fe", "on-background": "#0b1c30",
                        "outline-variant": "#c3c6d7", "tertiary-fixed": "#ffddb8",
                        "tertiary": "#784b00", "bg-light": "#F8FAFC",
                        "surface-bright": "#f8f9ff", "background": "#f8f9ff",
                        "on-primary-fixed-variant": "#003ea8", "surface-container": "#e5eeff",
                        "secondary-fixed-dim": "#4edea3", "inverse-surface": "#213145",
                        "surface-dark": "#1E293B", "surface-container-lowest": "#ffffff",
                        "secondary": "#006c49", "surface-container-low": "#eff4ff",
                        "on-error": "#ffffff", "surface-tint": "#0053db",
                        "surface-container-high": "#dce9ff", "secondary-fixed": "#6ffbbe",
                        "on-tertiary-container": "#ffeedd", "on-secondary-container": "#00714d",
                        "on-surface-variant": "#434655", "bg-dark": "#0F172A",
                        "surface-dim": "#cbdbf5", "surface-variant": "#d3e4fe",
                        "primary-fixed-dim": "#b4c5ff", "success-growth": "#10B981",
                        "on-secondary-fixed": "#002113", "outline": "#737686",
                        "tertiary-container": "#996100"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"
                    },
                    "spacing": {
                        "base-unit": "4px", "touch-target-min": "44px",
                        "container-margin": "16px", "card-padding": "20px", "gutter": "12px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"], "display-hero-mobile": ["Inter"],
                        "body-md": ["Inter"], "label-caps": ["Inter"],
                        "display-hero": ["Inter"], "body-lg": ["Inter"],
                        "body-sm": ["Inter"], "numeric-data": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "display-hero-mobile": ["28px", {"lineHeight": "34px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "display-hero": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "numeric-data": ["20px", {"lineHeight": "24px", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-light text-on-surface min-h-screen pb-24">

    <!-- ==================== 顶部导航栏 ==================== -->
    <header class="sticky top-0 z-40 flex justify-between items-center px-container-margin py-3 w-full max-w-7xl mx-auto bg-surface/90 backdrop-blur-md border-b border-outline-variant/20 shadow-sm">
        <div class="flex items-center gap-3">
            <a href="settings.html" class="w-11 h-11 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95">
                <span class="material-symbols-outlined text-primary">arrow_back</span>
            </a>
            <span class="text-headline-md font-headline-md font-bold text-primary tracking-tight">类别管理</span>
        </div>
    </header>

    <!-- ==================== 主内容区 ==================== -->
    <main class="max-w-4xl mx-auto px-container-margin py-6 space-y-8">

        <!-- 页面标题区 -->
        <section class="space-y-1">
            <h2 class="text-display-hero-mobile font-display-hero-mobile text-on-surface">类别管理</h2>
            <p class="text-body-md font-body-md text-on-surface-variant">自定义您的财务记录分类，保持收支清晰可见。</p>
        </section>

        <!-- 支出/收入 Tab 切换 -->
        <div class="flex p-1 bg-surface-container rounded-xl">
            <button id="tab-expense" class="flex-1 py-2 text-label-caps font-label-caps bg-surface-container-lowest text-primary shadow-sm rounded-lg transition-all">支出</button>
            <button id="tab-income" class="flex-1 py-2 text-label-caps font-label-caps text-on-surface-variant hover:text-primary transition-all">收入</button>
        </div>

        <!-- 分类网格展示区 -->
        <div id="category-grid" class="grid grid-cols-3 sm:grid-cols-4 gap-4">
            <div class="col-span-full text-center text-on-surface-variant py-12">
                <span class="material-symbols-outlined animate-spin mr-2">progress_activity</span>
                加载中...
            </div>
        </div>

        <!-- 添加自定义分类按钮 -->
        <button id="btn-add-category" class="w-full h-touch-target-min border-2 border-dashed border-outline-variant rounded-xl flex items-center justify-center gap-2 text-on-surface-variant hover:border-primary hover:text-primary transition-all group">
            <span class="material-symbols-outlined group-hover:scale-110 transition-transform">add</span>
            <span class="text-label-caps font-label-caps uppercase">添加自定义分类</span>
        </button>

        <!-- 已归档分类区 -->
        <section id="archived-section" class="space-y-4 hidden">
            <div class="flex items-center justify-between">
                <h3 class="text-headline-md font-headline-md text-on-surface">已归档类别</h3>
                <span id="archived-count" class="text-label-caps font-label-caps bg-surface-container px-2 py-1 rounded text-on-surface-variant">0 个项目</span>
            </div>
            <div id="archived-list" class="bg-surface-container-low rounded-2xl overflow-hidden border border-outline-variant/10">
            </div>
        </section>

        <!-- 优化建议卡片 -->
        <div class="relative bg-primary-container rounded-3xl p-8 overflow-hidden text-white flex flex-col md:flex-row items-center gap-6">
            <div class="z-10 flex-1 space-y-2 text-center md:text-left">
                <h4 class="text-headline-md font-headline-md">优化您的分类</h4>
                <p class="text-body-sm font-body-sm opacity-90">合理地整理分类可以帮助您更好地生成月度财务分析报告。</p>
            </div>
            <div class="absolute -right-12 -top-12 w-48 h-48 bg-white/10 rounded-full blur-3xl"></div>
        </div>
    </main>

    <!-- ==================== 添加分类弹窗 ==================== -->
    <div id="dialog-overlay" class="fixed inset-0 z-[60] hidden items-end justify-center bg-black/40" onclick="closeDialog()">
        <div class="w-full max-w-3xl bg-surface-container-lowest rounded-t-2xl p-card-padding pb-8 transition-transform duration-300" onclick="event.stopPropagation()">
            <h2 class="text-headline-md font-headline-md text-on-surface mb-4">添加自定义分类</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-body-sm text-on-surface-variant mb-1 block">分类名称</label>
                    <input id="dialog-name" class="w-full h-11 bg-surface-container-low border border-outline-variant rounded-lg px-3 text-body-md" placeholder="输入分类名称" maxlength="16">
                </div>
                <div>
                    <label class="text-body-sm text-on-surface-variant mb-1 block">选择图标</label>
                    <div id="icon-picker" class="flex flex-wrap gap-2">
                    </div>
                </div>
                <div>
                    <label class="text-body-sm text-on-surface-variant mb-1 block">类型</label>
                    <div class="flex p-1 bg-surface-container rounded-lg">
                        <button id="dialog-type-expense" class="flex-1 py-2 text-label-caps font-label-caps bg-surface-container-lowest text-danger-expense shadow-sm rounded-lg">支出</button>
                        <button id="dialog-type-income" class="flex-1 py-2 text-label-caps font-label-caps text-on-surface-variant rounded-lg">收入</button>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="closeDialog()" class="flex-1 h-11 border border-outline-variant rounded-xl text-body-md text-on-surface-variant hover:bg-surface-container transition-all">取消</button>
                    <button onclick="saveNewCategory()" class="flex-1 h-11 bg-primary text-on-primary rounded-xl text-body-md font-medium">保存</button>
                </div>
            </div>
        </div>
    </div>
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe pt-2 bg-surface/80 backdrop-blur-xl border-t border-outline-variant/10 shadow-[0_-4px_12px_0_rgba(0,0,0,0.05)] rounded-t-xl">
        <div id="bottom-nav"></div>
    </nav>
    <script src="../assets/js/nav.js"></script>
    <script>Nav.init('settings');</script>

    <script>
    (function () {
        var currentType = 'expense';
        var dialogType = 'EXPENSE';
        var selectedIcon = 'more_horiz';

        var tabExpense = document.getElementById('tab-expense');
        var tabIncome = document.getElementById('tab-income');

        // 常用图标列表
        var availableIcons = [
            'more_horiz', 'restaurant', 'shopping_bag', 'directions_car', 'movie',
            'home', 'medical_services', 'school', 'group', 'payments',
            'sports_esports', 'pets', 'phone_android', 'savings', 'travel_explore',
            'fitness_center', 'coffee', 'cookie', 'bakery_dining', 'dining',
            'local_taxi', 'local_parking', 'local_gas_station', 'subway',
            'checkroom', 'visibility', 'devices', 'flight', 'add'
        ];

        function setActiveTab(type) {
            currentType = type;
            if (type === 'expense') {
                tabExpense.className = 'flex-1 py-2 text-label-caps font-label-caps bg-surface-container-lowest text-primary shadow-sm rounded-lg transition-all';
                tabIncome.className = 'flex-1 py-2 text-label-caps font-label-caps text-on-surface-variant hover:text-primary transition-all';
            } else {
                tabIncome.className = 'flex-1 py-2 text-label-caps font-label-caps bg-surface-container-lowest text-primary shadow-sm rounded-lg transition-all';
                tabExpense.className = 'flex-1 py-2 text-label-caps font-label-caps text-on-surface-variant hover:text-primary transition-all';
            }
            loadCategories();
        }

        tabExpense.addEventListener('click', function () { setActiveTab('expense'); });
        tabIncome.addEventListener('click', function () { setActiveTab('income'); });

        // 加载分类
        function loadCategories() {
            var grid = document.getElementById('category-grid');
            grid.innerHTML = '<div class="col-span-full text-center text-on-surface-variant py-12"><span class="material-symbols-outlined animate-spin mr-2">progress_activity</span>加载中...</div>';

            Auth.fetchApi('/categories?type=' + currentType.toUpperCase())
            .then(function (result) {
                if (result.code !== 0) {
                    grid.innerHTML = '<div class="col-span-full text-center text-on-surface-variant py-12">加载失败</div>';
                    return;
                }

                var cats = result.data;
                var html = '';

                if (cats.length === 0) {
                    html = '<div class="col-span-full text-center text-on-surface-variant py-12">暂无分类</div>';
                } else {
                    cats.forEach(function (cat) {
                        var icon = cat.icon || 'more_horiz';
                        html += '<div class="flex flex-col items-center justify-center aspect-square bg-surface-container-lowest shadow-sm rounded-2xl p-card-padding relative group border border-transparent hover:border-primary-container transition-all cursor-pointer" onclick="showCategoryActions(' + cat.id + ', \'' + cat.name.replace(/'/g, "\\'") + '\', ' + cat.is_preset + ')">';
                        html += '<div class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-highest text-primary mb-2">';
                        html += '<span class="material-symbols-outlined" style="font-variation-settings: \'FILL\' 1;">' + icon + '</span>';
                        html += '</div>';
                        html += '<span class="text-label-caps font-label-caps text-on-surface">' + cat.name + '</span>';
                        if (cat.is_preset) {
                            html += '<span class="text-[9px] text-outline mt-1">系统预设</span>';
                        } else {
                            html += '<span class="text-[9px] text-primary mt-1">自定义</span>';
                        }
                        html += '</div>';
                    });
                }

                grid.innerHTML = html;
            });
        }

        // 分类操作（点击自定义分类时弹出）
        window.showCategoryActions = function (id, name, isPreset) {
            if (isPreset) {
                alert('系统预设分类不可修改');
                return;
            }
            if (confirm('删除分类 "' + name + '"？')) {
                Auth.fetchApi('/categories/' + id, { method: 'DELETE' })
                .then(function (result) {
                    if (result.code === 0) {
                        loadCategories();
                    } else {
                        alert(result.msg || '操作失败');
                    }
                });
            }
        };

        // 添加自定义分类
        document.getElementById('btn-add-category').addEventListener('click', function () {
            // 根据当前 tab 预填类型
            dialogType = currentType.toUpperCase() === 'EXPENSE' ? 'EXPENSE' : 'INCOME';
            document.getElementById('dialog-type-expense').className = dialogType === 'EXPENSE' ? 'flex-1 py-2 text-label-caps font-label-caps bg-surface-container-lowest text-danger-expense shadow-sm rounded-lg' : 'flex-1 py-2 text-label-caps font-label-caps text-on-surface-variant rounded-lg';
            document.getElementById('dialog-type-income').className = dialogType === 'INCOME' ? 'flex-1 py-2 text-label-caps font-label-caps bg-surface-container-lowest text-success-growth shadow-sm rounded-lg' : 'flex-1 py-2 text-label-caps font-label-caps text-on-surface-variant rounded-lg';

            // 渲染图标选择器
            var iconHtml = '';
            availableIcons.forEach(function (icon) {
                var border = icon === selectedIcon ? 'border-primary bg-primary/10' : 'border-outline-variant/30 bg-white';
                iconHtml += '<button class="w-10 h-10 rounded-lg border flex items-center justify-center hover:border-primary transition-colors icon-option" data-icon="' + icon + '">' +
                    '<span class="material-symbols-outlined text-[20px]">' + icon + '</span></button>';
            });
            document.getElementById('icon-picker').innerHTML = iconHtml;

            // 绑定图标点击
            document.querySelectorAll('.icon-option').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    selectedIcon = this.getAttribute('data-icon');
                    document.querySelectorAll('.icon-option').forEach(function (b) {
                        b.className = 'w-10 h-10 rounded-lg border flex items-center justify-center hover:border-primary transition-colors icon-option';
                    });
                    this.className = 'w-10 h-10 rounded-lg border border-primary bg-primary/10 flex items-center justify-center icon-option';
                });
            });

            document.getElementById('dialog-name').value = '';
            showDialog();
        });

        window.saveNewCategory = function () {
            var name = document.getElementById('dialog-name').value.trim();
            if (!name) {
                alert('请输入分类名称');
                return;
            }

            Auth.fetchApi('/categories', {
                method: 'POST',
                body: JSON.stringify({ name: name, icon: selectedIcon, type: dialogType })
            })
            .then(function (result) {
                if (result.code === 0) {
                    closeDialog();
                    loadCategories();
                } else {
                    alert(result.msg || '添加失败');
                }
            });
        };

        // 弹窗控制
        function showDialog() {
            var overlay = document.getElementById('dialog-overlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
        }

        window.closeDialog = function () {
            var overlay = document.getElementById('dialog-overlay');
            overlay.classList.add('hidden');
            overlay.classList.remove('flex');
        };

        // 初始化
        loadCategories();
    })();
    </script>
</body>
</html>
