<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>修改密码 - 每日财务管家</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <link href="../assets/css/base.css" rel="stylesheet">
    <script src="../assets/js/auth.js"></script>
    <script>Auth.check();</script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff", "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#ffb95f", "on-secondary-fixed-variant": "#005236",
                        "tertiary": "#784b00", "surface-container-low": "#eff4ff",
                        "secondary": "#006c49", "secondary-fixed": "#6ffbbe",
                        "outline": "#737686", "on-surface": "#0b1c30",
                        "inverse-primary": "#b4c5ff", "secondary-fixed-dim": "#4edea3",
                        "on-tertiary-fixed": "#2a1700", "surface-container": "#e5eeff",
                        "on-primary-fixed": "#00174b", "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#ffddb8", "on-error-container": "#93000a",
                        "outline-variant": "#c3c6d7", "on-secondary-fixed": "#002113",
                        "bg-light": "#F8FAFC", "on-primary": "#ffffff",
                        "surface-bright": "#f8f9ff", "success-growth": "#10B981",
                        "danger-expense": "#EF4444", "inverse-on-surface": "#eaf1ff",
                        "inverse-surface": "#213145", "on-background": "#0b1c30",
                        "tertiary-container": "#996100", "surface-container-high": "#dce9ff",
                        "on-tertiary-container": "#ffeedd", "error": "#ba1a1a",
                        "primary": "#004ac6", "on-tertiary-fixed-variant": "#653e00",
                        "secondary-container": "#6cf8bb", "on-primary-container": "#eeefff",
                        "background": "#f8f9ff", "surface-tint": "#0053db",
                        "surface-dark": "#1E293B", "primary-container": "#2563eb",
                        "on-tertiary": "#ffffff", "on-secondary": "#ffffff",
                        "bg-dark": "#0F172A", "surface-container-highest": "#d3e4fe",
                        "primary-fixed-dim": "#b4c5ff", "surface-variant": "#d3e4fe",
                        "on-secondary-container": "#00714d", "on-surface-variant": "#434655",
                        "warning-alert": "#F59E0B", "primary-fixed": "#dbe1ff",
                        "on-primary-fixed-variant": "#003ea8", "surface": "#f8f9ff",
                        "surface-dim": "#cbdbf5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"
                    },
                    "spacing": {
                        "touch-target-min": "44px", "card-padding": "20px",
                        "container-margin": "16px", "gutter": "12px", "base-unit": "4px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"], "display-hero-mobile": ["Inter"],
                        "body-md": ["Inter"], "label-caps": ["Inter"],
                        "display-hero": ["Inter"], "body-lg": ["Inter"],
                        "body-sm": ["Inter"], "numeric-data": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "display-hero-mobile": ["28px", {"lineHeight": "34px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "display-hero": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "numeric-data": ["20px", {"lineHeight": "24px", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-bg-light text-on-surface min-h-screen pb-24">

    <!-- ==================== 顶部导航栏 ==================== -->
    <!-- 返回 → settings.html -->
    <header class="sticky top-0 z-40 flex justify-between items-center px-container-margin py-3 w-full max-w-7xl mx-auto bg-surface/90 backdrop-blur-md border-b border-outline-variant/20 shadow-sm">
        <div class="flex items-center gap-3">
            <a href="settings.html" class="w-11 h-11 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95">
                <span class="material-symbols-outlined text-primary">arrow_back</span>
            </a>
            <span class="text-headline-md font-headline-md font-bold text-primary tracking-tight">修改密码</span>
        </div>
    </header>

    <!-- ==================== 主内容区 ==================== -->
    <main class="max-w-xl mx-auto px-container-margin mt-8">

        <!-- 密码要求提示卡片 -->
        <div class="bg-primary-container/20 border border-primary/20 rounded-xl p-4 mb-8 flex items-start gap-3">
            <span class="material-symbols-outlined text-primary mt-0.5">info</span>
            <p class="text-body-sm text-on-surface-variant">密码长度需为 6-20 个字符，含大小写字母、数字和特殊字符。修改后需要重新登录。</p>
        </div>

        <!-- 密码修改表单 -->
        <div class="space-y-6">
            <!-- 当前密码输入 -->
            <div class="flex flex-col gap-2">
                <label class="text-on-surface text-body-sm font-semibold" for="old-password">当前密码</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">lock</span>
                    <input class="w-full h-touch-target-min pl-12 pr-12 rounded-lg border border-outline-variant bg-surface-container-low text-on-surface text-body-md placeholder:text-outline focus:border-primary focus:outline-none focus:ring-0" id="old-password" placeholder="请输入当前密码" type="password">
                    <!-- 密码可见性切换按钮 -->
                    <button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" onclick="togglePassword('old-password', this)" type="button">
                        <span class="material-symbols-outlined">visibility_off</span>
                    </button>
                </div>
            </div>

            <!-- 新密码输入 -->
            <div class="flex flex-col gap-2">
                <label class="text-on-surface text-body-sm font-semibold" for="new-password">新密码</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">lock_open</span>
                    <input class="w-full h-touch-target-min pl-12 pr-12 rounded-lg border border-outline-variant bg-surface-container-low text-on-surface text-body-md placeholder:text-outline focus:border-primary focus:outline-none focus:ring-0" id="new-password" placeholder="6-20位新密码" type="password" maxlength="20">
                    <button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" onclick="togglePassword('new-password', this)" type="button">
                        <span class="material-symbols-outlined">visibility_off</span>
                    </button>
                </div>
            </div>

            <!-- 确认新密码输入 -->
            <div class="flex flex-col gap-2">
                <label class="text-on-surface text-body-sm font-semibold" for="confirm-password">确认新密码</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">lock_reset</span>
                    <input class="w-full h-touch-target-min pl-12 pr-12 rounded-lg border border-outline-variant bg-surface-container-low text-on-surface text-body-md placeholder:text-outline focus:border-primary focus:outline-none focus:ring-0" id="confirm-password" placeholder="再次输入新密码" type="password" maxlength="20">
                    <button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" onclick="togglePassword('confirm-password', this)" type="button">
                        <span class="material-symbols-outlined">visibility_off</span>
                    </button>
                </div>
            </div>

            <!-- 密码强度指示条（4 段进度条） -->
            <div class="space-y-2">
                <div class="flex gap-1">
                    <div class="h-1.5 flex-1 bg-surface-container-high rounded-full"></div>
                    <div class="h-1.5 flex-1 bg-surface-container-high rounded-full"></div>
                    <div class="h-1.5 flex-1 bg-surface-container-high rounded-full"></div>
                    <div class="h-1.5 flex-1 bg-surface-container-high rounded-full"></div>
                </div>
                <p class="text-label-caps text-on-surface-variant">密码强度：尚未输入</p>
            </div>

            <!-- 提交按钮 -->
            <button id="btn-submit" class="w-full h-touch-target-min bg-primary text-on-primary rounded-full font-bold text-body-lg shadow-md hover:bg-primary-container transition-all active:scale-[0.98]">
                确认修改
            </button>
        </div>
    </main>

    <!-- ==================== 底部导航栏 ==================== -->
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe pt-2 bg-surface/80 backdrop-blur-xl border-t border-outline-variant/10 shadow-[0_-4px_12px_0_rgba(0,0,0,0.05)] rounded-t-xl">
        <div id="bottom-nav"></div>
    </nav>
    <script src="../assets/js/nav.js"></script>
    <script>Nav.init('settings');</script>

    <!-- ==================== 密码逻辑 ==================== -->
    <script>
    (function () {
        var oldPwd = document.getElementById('old-password');
        var newPwd = document.getElementById('new-password');
        var confirmPwd = document.getElementById('confirm-password');
        var strengthBars = document.querySelectorAll('.space-y-2 .h-1\\.5');
        var strengthText = document.querySelector('.space-y-2 .text-label-caps');
        var btn = document.getElementById('btn-submit');

        // 密码强度实时评估
        function updateStrength() {
            var pwd = newPwd.value;
            var score = 0;
            if (pwd.length >= 6) score++;
            if (pwd.length >= 10) score++;
            if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) score++;
            if (/\d/.test(pwd)) score++;

            var colors = ['bg-outline-variant', 'bg-danger-expense', 'bg-warning-alert', 'bg-primary'];
            var labels = ['尚未输入', '弱', '一般', '强', '极强'];
            for (var i = 0; i < 4; i++) {
                strengthBars[i].className = 'h-1.5 flex-1 bg-surface-container-high rounded-full';
                if (i < score) {
                    strengthBars[i].className = 'h-1.5 flex-1 ' + colors[score - 1] + ' rounded-full';
                }
            }
            strengthText.textContent = '密码强度：' + (pwd ? labels[score] : labels[0]);
        }

        newPwd.addEventListener('input', updateStrength);

        // 密码可见性切换
        window.togglePassword = function (inputId, btnEl) {
            var input = document.getElementById(inputId);
            var icon = btnEl.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility_off';
            }
        };

        // 提交修改
        btn.addEventListener('click', function () {
            var oldPassword = oldPwd.value.trim();
            var newPassword = newPwd.value.trim();
            var confirmPassword = confirmPwd.value.trim();

            if (!oldPassword || !newPassword) {
                alert('请输入旧密码和新密码');
                return;
            }
            if (newPassword.length < 6 || newPassword.length > 20) {
                alert('密码长度需为6-20位');
                return;
            }
            if (newPassword !== confirmPassword) {
                alert('两次输入的密码不一致');
                return;
            }

            btn.disabled = true;
            btn.textContent = '修改中...';

            Auth.fetchApi('/user/password', {
                method: 'PUT',
                body: JSON.stringify({ old_password: oldPassword, new_password: newPassword })
            })
            .then(function (result) {
                btn.disabled = false;
                btn.textContent = '确认修改';
                if (result.code === 0) {
                    alert('密码修改成功，请重新登录');
                    Auth.logout();
                } else {
                    alert(result.msg || '修改失败');
                }
            })
            .catch(function () {
                btn.disabled = false;
                btn.textContent = '确认修改';
                alert('网络错误，请稍后重试');
            });
        });
    })();
    </script>
</body>
</html>
