<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bill Detail - 每日财务管家</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb95f",
                        "on-surface": "#0b1c30",
                        "on-primary-fixed": "#00174b",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed-variant": "#653e00",
                        "inverse-on-surface": "#eaf1ff",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#b4c5ff",
                        "error-container": "#ffdad6",
                        "warning-alert": "#F59E0B",
                        "secondary-container": "#6cf8bb",
                        "on-tertiary-fixed": "#2a1700",
                        "primary-container": "#2563eb",
                        "surface": "#f8f9ff",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#eeefff",
                        "error": "#ba1a1a",
                        "danger-expense": "#EF4444",
                        "primary": "#004ac6",
                        "primary-fixed": "#dbe1ff",
                        "on-secondary-fixed-variant": "#005236",
                        "surface-container-highest": "#d3e4fe",
                        "on-background": "#0b1c30",
                        "outline-variant": "#c3c6d7",
                        "tertiary-fixed": "#ffddb8",
                        "tertiary": "#784b00",
                        "bg-light": "#F8FAFC",
                        "surface-bright": "#f8f9ff",
                        "background": "#f8f9ff",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-container": "#e5eeff",
                        "secondary-fixed-dim": "#4edea3",
                        "inverse-surface": "#213145",
                        "surface-dark": "#1E293B",
                        "surface-container-lowest": "#ffffff",
                        "secondary": "#006c49",
                        "surface-container-low": "#eff4ff",
                        "on-error": "#ffffff",
                        "surface-tint": "#0053db",
                        "surface-container-high": "#dce9ff",
                        "secondary-fixed": "#6ffbbe",
                        "on-tertiary-container": "#ffeedd",
                        "on-secondary-container": "#00714d",
                        "on-surface-variant": "#434655",
                        "bg-dark": "#0F172A",
                        "surface-dim": "#cbdbf5",
                        "surface-variant": "#d3e4fe",
                        "primary-fixed-dim": "#b4c5ff",
                        "success-growth": "#10B981",
                        "on-secondary-fixed": "#002113",
                        "outline": "#737686",
                        "tertiary-container": "#996100"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base-unit": "4px",
                        "touch-target-min": "44px",
                        "container-margin": "16px",
                        "card-padding": "20px",
                        "gutter": "12px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "display-hero-mobile": ["Inter"],
                        "body-md": ["Inter"],
                        "label-caps": ["Inter"],
                        "display-hero": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "numeric-data": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "display-hero-mobile": ["28px", {"lineHeight": "34px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "display-hero": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "numeric-data": ["20px", {"lineHeight": "24px", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .receipt-tear {
            background-image: radial-gradient(circle at 10px 0, transparent 10px, white 11px);
            background-size: 20px 20px;
            background-repeat: repeat-x;
            height: 10px;
            width: 100%;
        }
    </style>
</head>
<body class="bg-bg-light text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="sticky top-0 z-40 flex justify-between items-center px-container-margin py-3 w-full max-w-7xl mx-auto bg-surface/90 dark:bg-bg-dark/90 backdrop-blur-md border-b border-outline-variant/20 dark:border-outline/10 shadow-sm">
<div class="flex items-center gap-3">
<button class="w-11 h-11 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<span class="text-headline-md font-headline-md font-bold text-primary tracking-tight">每日财务管家</span>
</div>
<div class="flex items-center gap-2">
<button class="w-11 h-11 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant">share</span>
</button>
</div>
</header>
<main class="flex-grow w-full max-w-md mx-auto px-container-margin py-8">
<!-- Transaction Detail Card (Receipt Style) -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_12px_24px_rgba(0,0,0,0.05)] overflow-hidden flex flex-col relative">
<!-- Category Header -->
<div class="p-card-padding flex flex-col items-center border-b border-dashed border-outline-variant/40">
<div class="w-16 h-16 bg-primary-fixed text-on-primary-fixed-variant rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-[32px]" data-icon="restaurant" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface-variant mb-1">餐饮美食</h2>
<div class="flex items-baseline gap-1">
<span class="font-display-hero-mobile text-display-hero-mobile text-danger-expense">-</span>
<span class="font-display-hero-mobile text-display-hero-mobile text-danger-expense">168.00</span>
<span class="font-label-caps text-label-caps text-on-surface-variant ml-1">CNY</span>
</div>
</div>
<!-- Detail List -->
<div class="p-card-padding space-y-6">
<!-- Transaction Time -->
<div class="flex justify-between items-center">
<span class="font-label-caps text-label-caps text-on-surface-variant">交易时间</span>
<span class="font-body-md text-body-md text-on-surface">2023-11-24 12:45</span>
</div>
<!-- Account -->
<div class="flex justify-between items-center">
<span class="font-label-caps text-label-caps text-on-surface-variant">支付账户</span>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-body-sm text-primary">credit_card</span>
<span class="font-body-md text-body-md text-on-surface">招商银行储蓄卡 (8802)</span>
</div>
</div>
<!-- Tags -->
<div class="flex flex-col gap-3">
<span class="font-label-caps text-label-caps text-on-surface-variant">账单标签</span>
<div class="flex flex-wrap gap-2">
<span class="px-3 py-1 bg-surface-container-high text-on-surface-variant rounded-full text-label-caps font-label-caps">Necessary</span>
<span class="px-3 py-1 bg-surface-container-high text-on-surface-variant rounded-full text-label-caps font-label-caps">Weekend</span>
</div>
</div>
<!-- Notes -->
<div class="flex flex-col gap-2 bg-surface-container-low p-4 rounded-lg">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-body-sm text-outline">notes</span>
<span class="font-label-caps text-label-caps text-on-surface-variant">备注信息</span>
</div>
<p class="font-body-md text-body-md text-on-surface italic leading-relaxed">
                        周五团队午餐，在五角场万达广场所点的日料套餐，人均消费较高但味道不错。
                    </p>
</div>
</div>
<!-- Decorative Receipt Bottom -->
<div class="w-full h-4 relative">
<div class="absolute inset-0 flex">
<div class="flex-1 border-t border-dashed border-outline-variant/30"></div>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-10 flex flex-col gap-3">
<button class="w-full h-[44px] bg-primary text-on-primary rounded-xl font-headline-md flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">edit</span>
                修改账单
            </button>
<button class="w-full h-[44px] border border-outline-variant text-danger-expense rounded-xl font-headline-md flex items-center justify-center gap-2 hover:bg-error-container hover:border-transparent active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">delete</span>
                删除账单
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe pt-2 bg-surface/80 dark:bg-bg-dark/80 backdrop-blur-xl border-t border-outline-variant/10 dark:border-outline/5 shadow-[0_-4px_12px_0_rgba(0,0,0,0.05)]">
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline px-4 py-2 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="text-label-caps font-label-caps">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline px-4 py-2 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined" data-icon="insights">insights</span>
<span class="text-label-caps font-label-caps">Stats</span>
</a>
<button class="flex flex-col items-center justify-center bg-secondary-container dark:bg-secondary text-on-secondary-container dark:text-on-secondary rounded-2xl px-4 py-2 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="add_circle" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="text-label-caps font-label-caps">Add</span>
</button>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline px-4 py-2 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="text-label-caps font-label-caps">Profile</span>
</a>
</nav>
<!-- Padding for bottom nav -->
<div class="h-24"></div>
</body></html>
