<option value="+86">+86 中国</option>
<option value="+852">+852 香港</option>
<option value="+886">+886 台湾</option>
<option value="+1">+1 美国</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
<input class="flex-1 h-touch-target-min px-4 rounded-lg border border-outline-variant bg-surface-container-low text-on-surface text-body-md placeholder:text-outline focus:border-primary focus:outline-none focus:ring-0" placeholder="请输入手机号" type="tel">
</div>
</div>

<button class="px-4 h-touch-target-min text-primary text-body-sm font-semibold border border-primary rounded-lg hover:bg-primary-container/10 transition-colors whitespace-nowrap">
                            获取验证码
